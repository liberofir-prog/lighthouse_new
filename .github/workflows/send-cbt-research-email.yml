name: Send CBT Research Email

on:
  push:
    paths:
      - 'research-reports/cbt-latest.html'

jobs:
  send-email:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Send via Resend
        run: |
          CONTENT=$(cat research-reports/cbt-latest.html)
          JSON_CONTENT=$(echo "$CONTENT" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))')
          curl -s -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer ${{ secrets.RESEND_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"from\": \"עוזר המחקר <research@liber.co.il>\",
              \"to\": [\"liber.ofir@gmail.com\"],
              \"subject\": \"[בדיקה] סיכום חודשי - CBT לנוער ומבוגרים\",
              \"html\": $JSON_CONTENT
            }"
