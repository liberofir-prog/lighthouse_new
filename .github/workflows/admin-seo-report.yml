name: שלח דוחות — אופיר בלבד

on:
  push:
    paths:
      - 'research-reports/ofir-report.html'

jobs:
  send-reports:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Send Migdalor report to Ofir
        run: |
          CONTENT=$(cat research-reports/ofir-report.html)
          JSON_CONTENT=$(echo "$CONTENT" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))')
          curl -s -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer ${{ secrets.RESEND_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"from\": \"מערכת מגדלור <research@liber.co.il>\", \"to\": [\"liber.ofir@gmail.com\"], \"subject\": \"דוח מגדלור — על פי דרישה\", \"html\": $JSON_CONTENT}"

      - name: Send Keshev Halev report to Ofir
        run: |
          CONTENT=$(cat research-reports/ofir-cbt-report.html)
          JSON_CONTENT=$(echo "$CONTENT" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))')
          curl -s -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer ${{ secrets.RESEND_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"from\": \"מערכת מגדלור <research@liber.co.il>\", \"to\": [\"liber.ofir@gmail.com\"], \"subject\": \"דוח קשב הלב — על פי דרישה\", \"html\": $JSON_CONTENT}"
